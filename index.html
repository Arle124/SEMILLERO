<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitrinas IOT - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card h2 { margin-top: 0; font-size: 1.2rem; color: #555; }
        .status-dot { height: 10px; width: 10px; background-color: #2ecc71; border-radius: 50%; display: inline-block; margin-right: 5px; }
        #last-update { font-size: 0.9rem; color: #888; }
        canvas { max-width: 100%; height: auto !important; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>🌿 Vitrinas IOT</h1>
                <p id="last-update">Esperando datos...</p>
            </div>
            <div>
                <span class="status-dot"></span> En Vivo
            </div>
        </header>

        <div class="grid">
            <div class="card">
                <h2>Humedad del Suelo</h2>
                <canvas id="chartSuelo"></canvas>
            </div>
            <div class="card">
                <h2>Humedad del Aire (%)</h2>
                <canvas id="chartAire"></canvas>
            </div>
            <div class="card">
                <h2>Temperatura (°C)</h2>
                <canvas id="chartTemp"></canvas>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module" src="app.js"></script>
</body>
</html>
