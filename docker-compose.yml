services:
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      TZ: America/Bogota
      POSTGRES_USER: asher
      POSTGRES_PASSWORD: '12589'
      POSTGRES_DB: semillero
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  bridge:
    build: .
    container_name: esp32_bridge
    depends_on:
      - db
    ports:
      - "3000:3000"
    environment:
      - TZ=America/Bogota
      - DATABASE_URL=postgresql://asher:12589@db:5432/semillero
      - VITRINA_ID=${VITRINA_ID:-1}
      - ESP32_URL=${ESP32_URL:-http://192.168.4.1/datos}
    volumes:
      - ./vitrinasiot-firebase-adminsdk-fbsvc-0201f15c59.json:/app/vitrinasiot-firebase-adminsdk-fbsvc-0201f15c59.json:ro
    restart: always

volumes:
  pgdata:
    driver: local
